version: '3.8'

services:

  # ─── Databases ───────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Services ───────────────────────────────────────────────
  product_service:
    build: ./src/product_service
    container_name: product_service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=products_db
      - DB_USER=devuser
      - DB_PASSWORD=devpassword
      - SECRET_KEY="change-me-in-production"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  

  user_service:
    build: ./src/user_service
    container_name: user_service
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=users_db
      - DB_USER=devuser
      - DB_PASSWORD=devpassword
      - SECRET_KEY="change-me-in-production"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  order_service:
    build: ./src/order_service
    container_name: order_service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=orders_db
      - DB_USER=devuser
      - DB_PASSWORD=devpassword
      - SECRET_KEY="change-me-in-production"
      # Inter-service URLs
      - PRODUCT_SERVICE_URL=http://product_service:8001
      - USER_SERVICE_URL=http://user_service:8002
      - INVENTORY_SERVICE_URL=http://inventory_service:8005
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


  payment_service:
    build: ./src/payment_service
    container_name: payment_service
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=payments_db
      - DB_USER=devuser
      - DB_PASSWORD=devpassword
      - SECRET_KEY="change-me-in-production"
      - ORDER_SERVICE_URL=http://order_service:8003
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  inventory_service:
    build: ./src/inventory_service
    container_name: inventory_service
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=inventory_db
      - DB_USER=devuser
      - DB_PASSWORD=devpassword
      - SECRET_KEY="change-me-in-production"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


  # ─── API Gateway ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: api_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - product_service
      - user_service
      - order_service
      - payment_service
      - inventory_service
    restart: unless-stopped

  # ─── Monitoring ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: